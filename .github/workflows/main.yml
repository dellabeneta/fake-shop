name: CI-CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Obtendo o código da aplicação
        uses: actions/checkout@v4
        
      - name: Autenticar no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Buildando a Imagem Docker e Efetuando o Push 
        uses: docker/build-push-action@v6
        with:
          context: ./src
          push: true
          file: ./src/Dockerfile
          tags: |
            dellabeneta/fake-shop:latest
            dellabeneta/fake-shop:v${{ github.run_number}}

  cd:
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Obtendo o código da aplicação
        uses: actions/checkout@v4
        
      - name: Autenticar na AWS/Kubernetes
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: sa-east-1


        
      - name: Configurar o Kubectl/Kubeconfig
        run: echo "Executando o comando AWS EKS Update Kubeconfig"
      - name: Executar o Kubectl Apply dos Manifestos de Deploy
        run: echo "Executando o comando Kubectl Apply"
